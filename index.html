<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pixel Tangga Luar Biasa</title>
    <style>
        :root { --bg: #1a1a2e; --accent: #e94560; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* OVERLAYS */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }

        /* CHARACTER SELECT */
        .char-box { display: flex; gap: 30px; margin: 20px; }
        .char-option { 
            width: 100px; height: 100px; background: #16213e; border: 3px solid #333; 
            border-radius: 15px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .char-option img { width: 70px; height: 70px; image-rendering: pixelated; }
        .char-option:hover { border-color: var(--accent); transform: scale(1.1); }
        .selected { border-color: gold !important; box-shadow: 0 0 15px gold; }

        /* GAME BOARD */
        #game-container { display: flex; gap: 20px; }
        #board-wrapper { position: relative; width: 550px; height: 550px; background: white; border: 5px solid #0f3460; border-radius: 8px; }
        #board { display: grid; grid-template-columns: repeat(10, 55px); grid-template-rows: repeat(10, 55px); }
        .cell { width: 55px; height: 55px; border: 0.5px solid #eee; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #aaa; }
        #svg-layer { position: absolute; inset: 0; pointer-events: none; z-index: 5; }

        /* BIDAK (THE CHARACTERS) */
        .bidak { 
            width: 45px; height: 45px; position: absolute; z-index: 10; 
            transition: all 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            image-rendering: pixelated;
        }

        /* DICE UI */
        #ui-panel { width: 300px; background: #16213e; padding: 20px; border-radius: 15px; }
        .dice-box { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; perspective: 1000px; }
        .cube { width: 50px; height: 50px; position: relative; transform-style: preserve-3d; transition: transform 1.2s; }
        .cube div { position: absolute; width: 50px; height: 50px; background: white; border: 2px solid #ccc; color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 5px; }
        .act-dice div { background: var(--accent); color: white; }

        /* SISI DADU */
        .s1 { transform: translateZ(25px); } .s6 { transform: rotateY(180deg) translateZ(25px); }
        .s3 { transform: rotateY(90deg) translateZ(25px); } .s4 { transform: rotateY(-90deg) translateZ(25px); }
        .s2 { transform: rotateX(-90deg) translateZ(25px); } .s5 { transform: rotateX(90deg) translateZ(25px); }

        .btn-roll { background: var(--accent); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; box-shadow: 0 4px #950740; }
        .btn-roll:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

<div id="char-overlay" class="overlay">
    <h2>Pilih Karakter Kamu</h2>
    <div class="char-box">
        <div class="char-option" onclick="selectChar(0)" id="opt0">
            <img src="https://api.iconify.design/pixelarticons:human-handsup.svg?color=%233498db" alt="Girl">
            <p style="position:absolute; bottom:-25px; font-size:12px;">Gadis</p>
        </div>
        <div class="char-option" onclick="selectChar(1)" id="opt1">
            <img src="https://api.iconify.design/pixelarticons:android.svg?color=%232ecc71" alt="Panda">
            <p style="position:absolute; bottom:-25px; font-size:12px;">Panda Bot</p>
        </div>
    </div>
    <button class="btn-roll" style="width:200px; margin-top:40px;" onclick="start()" id="btn-start" disabled>MAIN SEKARANG</button>
</div>

<div id="game-container" class="hidden">
    <div id="board-wrapper">
        <svg id="svg-layer"></svg>
        <div id="board"></div>
        <img id="p1" class="bidak" src="">
        <img id="p2" class="bidak" src="">
    </div>

    <div id="ui-panel">
        <div class="dice-box">
            <div class="cube" id="cube1">
                <div class="s1">1</div><div class="s6">6</div><div class="s3">3</div><div class="s4">4</div><div class="s2">2</div><div class="s5">5</div>
            </div>
            <div class="cube act-dice" id="cube2">
                <div class="s1">⚡</div><div class="s6">💀</div><div class="s3">🃏</div><div class="s4">🎯</div><div class="s2">🛡️</div><div class="s5">🔄</div>
            </div>
        </div>
        <button class="btn-roll" id="btn-kocok" onclick="kocok()">KOCOK DADU</button>
        <p id="log" style="text-align:center; font-size:14px; color:cyan; margin-top:20px;"></p>
    </div>
</div>

<script>
    let p1Pos = 1, p2Pos = 1, jumps = {};
    let chosenIdx = -1, r1 = 0, r2 = 0;
    const chars = [
        "https://api.iconify.design/pixelarticons:human-run.svg?color=%233498db", // Gadis
        "https://api.iconify.design/pixelarticons:mood-happy.svg?color=%232ecc71"  // Panda/Bot imut
    ];

    // Buat Papan
    for (let i = 100; i >= 1; i--) {
        const cell = document.createElement('div');
        cell.className = 'cell'; cell.id = 'cell-' + i; cell.innerText = i;
        let row = Math.floor((i-1)/10), col = (i-1)%10;
        cell.style.order = (9-row)*10 + (row % 2 === 0 ? col : 9-col);
        document.getElementById('board').appendChild(cell);
    }

    function selectChar(idx) {
        chosenIdx = idx;
        document.getElementById('opt0').classList.remove('selected');
        document.getElementById('opt1').classList.remove('selected');
        document.getElementById('opt' + idx).classList.add('selected');
        document.getElementById('btn-start').disabled = false;
    }

    function start() {
        document.getElementById('char-overlay').classList.add('hidden');
        document.getElementById('game-container').classList.remove('hidden');
        document.getElementById('p1').src = chars[chosenIdx];
        document.getElementById('p2').src = chars[1 - chosenIdx];
        
        // Buat Tangga/Ular
        for(let i=0; i<8; i++){
            let s = Math.floor(Math.random()*80)+10, e = Math.floor(Math.random()*80)+10;
            if(Math.abs(s-e)>15) jumps[s] = e;
        }
        drawJumps();
        updatePos();
    }

    function drawJumps() {
        const svg = document.getElementById('svg-layer'), b = board.getBoundingClientRect();
        for(let s in jumps){
            let sR = document.getElementById('cell-'+s).getBoundingClientRect();
            let eR = document.getElementById('cell-'+jumps[s]).getBoundingClientRect();
            let color = jumps[s] > s ? "#2ecc71" : "#e74c3c";
            svg.innerHTML += `<line x1="${sR.left-b.left+27}" y1="${sR.top-b.top+27}" x2="${eR.left-b.left+27}" y2="${eR.top-b.top+27}" stroke="${color}" stroke-width="4" stroke-linecap="round" opacity="0.4"/>`;
        }
    }

    function kocok() {
        document.getElementById('btn-kocok').disabled = true;
        let n1 = Math.floor(Math.random()*6), n2 = Math.floor(Math.random()*6);
        
        // Rotasi Dadu
        r1 += 720; r2 += 720;
        const rots = [[0,0],[90,0],[0,-90],[0,90],[-90,0],[0,180]];
        document.getElementById('cube1').style.transform = `rotateX(${r1+rots[n1][0]}deg) rotateY(${r1+rots[n1][1]}deg)`;
        document.getElementById('cube2').style.transform = `rotateX(${r2+rots[n2][0]}deg) rotateY(${r2+rots[n2][1]}deg)`;

        setTimeout(() => {
            p1Pos = Math.min(100, p1Pos + n1 + 1);
            if(jumps[p1Pos]) p1Pos = jumps[p1Pos];
            updatePos();
            if(p1Pos === 100) alert("Kamu Menang!");
            
            setTimeout(() => {
                p2Pos = Math.min(100, p2Pos + Math.floor(Math.random()*6)+1);
                if(jumps[p2Pos]) p2Pos = jumps[p2Pos];
                updatePos();
                document.getElementById('btn-kocok').disabled = false;
            }, 800);
        }, 1200);
    }

    function updatePos() {
        const b = board.getBoundingClientRect();
        [p1Pos, p2Pos].forEach((p, i) => {
            const c = document.getElementById('cell-'+p).getBoundingClientRect();
            const el = document.getElementById('p'+(i+1));
            el.style.left = (c.left - b.left + 5) + 'px';
            el.style.top = (c.top - b.top + 5) + 'px';
        });
    }
</script>
</body>
</html>
